<div class="console-container">
  <a class="console-back" routerLink="/devices">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Volver
  </a>

  <h2 class="console-title">Consola de dispositivo</h2>
  <p class="console-subtitle">Selecciona el método de conexión para comunicarte con el dispositivo</p>

  <div class="console-actions">
    <button class="console-btn console-btn--bluetooth" (click)="onBluetooth()">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 7 18 13 12 17 12 1 18 5 6 11"></polyline>
        <line x1="12" y1="17" x2="12" y2="23"></line>
        <line x1="8" y1="21" x2="16" y2="21"></line>
      </svg>
      <span class="console-btn__label">Conexión Bluetooth</span>
      <span class="console-btn__desc">Comunicación inalámbrica con dispositivos cercanos</span>
    </button>

    <button class="console-btn console-btn--serial" (click)="onSerial()">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
        <line x1="4" y1="4" x2="9" y2="9"></line>
      </svg>
      <span class="console-btn__label">Conexión por Puerto Serie</span>
      <span class="console-btn__desc">Comunicación por cable USB / UART</span>
    </button>
  </div>
</div>
